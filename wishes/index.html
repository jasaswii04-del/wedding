<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anniversary Surprise</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
}

/* Background */
.lock-screen{
    width:100%;
    height:100vh;
    background:url("https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1600&auto=format&fit=crop") center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Dark Overlay */
.lock-screen::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.45);
}

/* Content */
.content{
    position:relative;
    color:white;
    text-align:center;
}

#time{
    font-size:70px;
    font-weight:bold;
}

#date{
    font-size:22px;
    margin-top:10px;
}

.lock{
    font-size:90px;
    margin:40px 0;
    animation:lockMove 2s infinite;
}

@keyframes lockMove{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

/* Swipe Button */
.btn{
    margin-top:20px;
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:#ff4081;
    color:white;
    font-size:20px;
    cursor:pointer;
    box-shadow:0 0 25px #ff4081;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.08);
}

/* Floating Hearts */
.heart{
    position:absolute;
    color:#ff5fa2;
    font-size:22px;
    animation:float 8s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh);
        opacity:0;
    }
}
</style>

</head>
<body>

<div class="lock-screen">

    <div class="content">

        <div id="time"></div>

        <div id="date"></div>

        <div class="lock">🔒</div>

        <button class="btn" onclick="nextPage()">
            Unlock ❤️
        </button>

    </div>

</div>

<script>

// Live Time
function updateClock(){

let now=new Date();

let time=now.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
});

let date=now.toDateString();

document.getElementById("time").innerHTML=time;

document.getElementById("date").innerHTML=date;

}

setInterval(updateClock,1000);

updateClock();

// Floating Hearts
for(let i=0;i<20;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=(5+Math.random()*5)+"s";

heart.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(heart);

}

// Go to PIN Page
function nextPage(){

window.location.href="pin.html";

}

</script>

</body>
</html>
