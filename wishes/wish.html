<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Love for Husband 💖</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Arial';
}

body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle,#0b0b1a,#000);
display:flex;
justify-content:center;
align-items:center;
}

/* stars */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%,100%{opacity:0.2;}
50%{opacity:1;}
}

/* hearts */
.heart{
position:absolute;
color:#ff4d6d;
font-size:18px;
animation:float 6s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(100vh) scale(1);}
100%{transform:translateY(-10vh) scale(1.5);}
}

/* card */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:30px;
border-radius:20px;
text-align:center;
width:85%;
max-width:520px;
box-shadow:0 0 40px rgba(255,0,100,0.3);
animation:pop 1.5s ease;
}

@keyframes pop{
from{transform:scale(0);opacity:0;}
to{transform:scale(1);opacity:1;}
}

/* title */
h1{
color:#ff4081;
text-shadow:0 0 25px #ff4081;
margin-bottom:10px;
}

/* glow line */
.line{
width:120px;
height:2px;
background:#ff4081;
margin:10px auto 20px;
box-shadow:0 0 15px #ff4081;
}

/* typing text */
#msg{
font-size:16px;
color:white;
line-height:1.8;
min-height:120px;
}

/* love pulse */
.love{
font-size:60px;
animation:pulse 1.2s infinite;
margin-bottom:10px;
color:#ff4081;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.3);}
}

</style>
</head>

<body>

<div class="card">
<div class="love">💖</div>
<h1>To My Husband</h1>
<div class="line"></div>
<div id="msg"></div>
</div>

<script>

// typing message
let text =
"My dear husband ❤️\n\nYou are my strength, my smile, and my forever home.\nEvery moment with you feels like a beautiful dream.\nI am lucky to walk this life holding your hand 💍\n\nHappy Wedding Anniversary my love 💖";

let i = 0;

function type(){
if(i < text.length){
document.getElementById("msg").innerHTML += text.charAt(i);
i++;
setTimeout(type,40);
}
}
type();

// stars
for(let i=0;i<100;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.animationDuration=(1+Math.random()*3)+"s";
document.body.appendChild(s);
}

// hearts
for(let i=0;i<25;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";
h.style.left=Math.random()*100+"%";
h.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(h);
}

</script>

</body>
</html>
