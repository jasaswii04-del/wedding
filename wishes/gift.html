<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Surprise</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(-45deg,#ff758c,#ff7eb3,#ffd3a5,#ffe29f);
background-size:400% 400%;
animation:bg 6s infinite;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Gift box */
.gift{
font-size:120px;
cursor:pointer;
animation:float 2s infinite;
transition:0.3s;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

h2{
color:white;
margin-top:20px;
}

/* Sparkles */
.spark{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:fly 3s linear infinite;
opacity:0.8;
}

@keyframes fly{
0%{
transform:translateY(100vh) scale(1);
opacity:1;
}
100%{
transform:translateY(-10vh) scale(0);
opacity:0;
}
}

/* Open animation */
.open{
animation:pop 0.6s forwards;
}

@keyframes pop{
0%{transform:scale(1);}
50%{transform:scale(1.4);}
100%{transform:scale(0);}
}

/* click hint */
.hint{
color:white;
font-size:18px;
margin-top:10px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="gift" onclick="openGift()">🎁</div>
<h2>Tap the Gift</h2>
<div class="hint">A surprise is waiting inside ❤️</div>

<script>

// Sparkles background
for(let i=0;i<30;i++){
let s=document.createElement("div");
s.className="spark";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(s);
}

// Open gift
function openGift(){

let gift=document.querySelector(".gift");
gift.classList.add("open");

setTimeout(()=>{
window.location.href="wish.html";
},600);

}

</script>

</body>
</html>
